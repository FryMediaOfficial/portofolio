<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Gambar | FryMedia</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        header { padding: 50px 20px; }
        h1 { font-size: 2.5rem; color: #ff007a; margin-bottom: 10px; }
        p { color: #bbb; }
        
        /* Layout Galeri */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
            background-color: #222;
        }
        .gallery img:hover {
            transform: scale(1.05);
            border: 2px solid #ff007a;
        }
        footer { margin-top: 50px; color: #555; font-size: 0.8rem; }
.gallery-item {
    transition: all 0.3s ease-in-out;
}

.gallery-item:hover {
    transform: translateY(-12px);
    box-shadow: 0 15px 35px rgba(79, 172, 254, 0.5);
}
    </style>
</head>
<body>

    <header style="display: flex; justify-content: flex-end; align-items: center; padding: 20px 5%; background: #0a0a0a;">
    <div style="text-align: right;">
        <img src="IMG_20260406_161427.png" alt="Logo Fry Media" style="width: 80px; height: auto;">
        <h1 style="color: #e0e0e0; letter-spacing: 2px;">FRY MEDIA OFFICIAL</h1>
        <p style="color: #a0a0a0; font-style: italic;">"Koleksi Karya Digital & Portofolio Terbaik"</p>
    </header>

    <div class="gallery-item">
    <div style="background: #121212; padding: 15px; border-radius: 20px; margin-bottom: 40px; border: 1px solid #2a4d69; box-shadow: 0 4px 15px rgba(0,0,0,0.5); overflow: hidden;">
    
    <img src="IMG_20260505_211132.png" alt="Knight" onclick="openModal(this)" style="width:100%; border-radius: 12px; cursor:pointer;">
    
    <h3 style="margin: 15px 0 5px 0; color: #ebf5ff; font-size: 1.2rem;">Knight</h3>
    <p style="margin: 0 0 15px 0; font-style: italic; color: #888; font-size: 0.9rem;">"My sword is my shield, my duty is my curse."</p>

    <div style="padding: 10px 0 0 0; display: flex; align-items: center; gap: 10px;">
        <button onclick="let span = this.nextElementSibling; if(!this.disabled){ span.innerText = parseInt(span.innerText) + 1; this.innerHTML='❤️ Liked!'; this.disabled=true; this.style.opacity='0.7'; }" 
                style="background: none; border: 1px solid #4facfe; color: #4facfe; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;">
            🤍 Like
        </button>
        <span style="color: #888; font-size: 0.8rem;">24</span> 
        <span style="color: #888; font-size: 0.8rem;">Likes</span>
    </div>

    <div style="background: #121212; padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #2a4d69; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <img src="belom_ada.png" alt="nama karakter - belom ada..." onclick="openModal(this)" style="width:100%; border-radius: 12px; cursor:pointer;">
    
    <h3 style="margin: 15px 0 5px 0; color: #ebf5ff; font-size: 1.2rem;">nama karakter</h3>
    <p style="margin: 0; font-style: italic; color: #888; font-size: 0.9rem;">"belom ada."</p>
</div>

    <div style="background: #121212; padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #2a4d69; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <img src="belom_ada.png" alt="nama karakter - belom ada..." onclick="openModal(this)" style="width:100%; border-radius: 12px; cursor:pointer;">
    
    <h3 style="margin: 15px 0 5px 0; color: #ebf5ff; font-size: 1.2rem;">nama karakter</h3>
    <p style="margin: 0; font-style: italic; color: #888; font-size: 0.9rem;">"belom ada"</p>
</div>

    </div>


    <footer>
        &copy; 2026 FryMediaOfficial. Dibuat dengan Tangan dan Pikiran.
    </footer>
    <div id="myModal" style="display:none; position:fixed; z-index:1000; padding-top:100px; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.9); overflow:auto;">
    <span onclick="document.getElementById('myModal').style.display='none'" style="position:absolute; top:15px; right:35px; color:#f1f1f1; font-size:40px; font-weight:bold; cursor:pointer;">&times;</span>
    <img id="img01" style="margin:auto; display:block; width:80%; max-width:700px; border-radius:10px; border: 2px solid #4facfe;">
    <div id="caption" style="margin:auto; display:block; width:80%; max-width:700px; text-align:center; color:#ccc; padding:10px 0;"></div>
</div>

<script>
function openModal(element) {
    document.getElementById("myModal").style.display = "block";
    document.getElementById("img01").src = element.src;
    document.getElementById("caption").innerHTML = element.alt;
}
</script>
    

</body>
</html>
