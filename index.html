<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Gambar | FryMedia</title>
    <style>
        body {
            background-color: #080808;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        header { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            padding: 30px 5%; 
            background: rgba(10, 10, 10, 0.85); 
            border-radius: 0 0 30px 30px;
            border-bottom: 2px solid #2a4d69;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .glowing-title {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 0;
            background: linear-gradient(90deg, #ff007a, #4facfe, #00f2fe, #ff007a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 10px rgba(79, 172, 254, 0.4));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* EFEK KETIK */
        #typing-text {
            color: #a0a0a0; 
            font-style: italic; 
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            letter-spacing: 1px;
            min-height: 1.2em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .gallery-item {
            background: rgba(24, 24, 24, 0.7); 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #2a4d69; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .gallery-item:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.5);
            border-color: #4facfe;
        }

        .gallery-item img {
            width: 100%;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        footer { 
            margin: 50px 0; 
            color: #555; 
            font-size: 0.8rem; 
            position: relative;
            z-index: 10;
        }

        #myModal {
            display:none; 
            position:fixed; 
            z-index:1000; 
            padding-top:80px; 
            left:0; top:0; 
            width:100%; height:100%; 
            background-color: rgba(0,0,0,0.95); 
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <header>
        <div style="text-align: right;">
            <img src="IMG_20260406_161427.png" alt="Logo Fry Media" style="width: 85px; height: auto; filter: drop-shadow(0 0 8px #4facfe); margin-bottom: 5px;">
            <h1 class="glowing-title">FRY MEDIA OFFICIAL</h1>
            <p id="typing-text"></p> 
        </div>
    </header>

    <div class="gallery">
        <div class="gallery-item">
            <img src="IMG_20260505_211132.png" alt="Knight" onclick="openModal(this)">
            <h3 style="margin: 15px 0 5px 0; color: #ebf5ff; font-size: 1.2rem;">Knight</h3>
            <p style="margin: 0 0 15px 0; font-style: italic; color: #888; font-size: 0.9rem;">"My sword is my shield, my duty is my curse."</p>
            <div style="padding: 10px 0 0 0; display: flex; align-items: center; gap: 10px; justify-content: center;">
                <button onclick="likeKarya(this)" style="background: none; border: 1px solid #4facfe; color: #4facfe; padding: 6px 18px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;">
                    🤍 Like
                </button>
                <span style="color: #888; font-size: 0.8rem;">24</span> 
                <span style="color: #888; font-size: 0.8rem;">Likes</span>
            </div>
        </div>

        <div class="gallery-item">
            <img src="belom_ada.png" alt="Coming soon..." onclick="openModal(this)">
            <h3 style="margin: 15px 0 5px 0; color: #ebf5ff; font-size: 1.2rem;">Karya Berikutnya</h3>
            <p style="margin: 0; font-style: italic; color: #888; font-size: 0.9rem;">"Coming soon..."</p>
        </div>

        <div class="gallery-item">
            <img src="belom_ada.png" alt="Coming soon..." onclick="openModal(this)">
            <h3 style="margin: 15px 0 5px 0; color: #ebf5ff; font-size: 1.2rem;">Karya Berikutnya</h3>
            <p style="margin: 0; font-style: italic; color: #888; font-size: 0.9rem;">"Coming soon..."</p>
        </div>
    </div>

    <footer>
        &copy; 2026 FryMediaOfficial. Dibuat dengan Tangan dan Pikiran.
    </footer>

    <div id="myModal">
        <span onclick="document.getElementById('myModal').style.display='none'" style="position:absolute; top:20px; right:35px; color:#f1f1f1; font-size:40px; font-weight:bold; cursor:pointer;">&times;</span>
        <img id="img01" style="margin:auto; display:block; width:85%; max-width:750px; border-radius:15px; border: 2px solid #4facfe; box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);">
        <div id="caption" style="margin:auto; display:block; width:80%; max-width:700px; text-align:center; color:#ccc; padding:20px 0; font-style: italic;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
    /* Bintang Fry Media */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": ["#ffffff", "#ff007a", "#4facfe"] },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": true },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": false },
            "move": { "enable": true, "speed": 1, "direction": "bottom", "random": true, "straight": false, "out_mode": "out" }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "bubble" } },
            "modes": { "bubble": { "size": 6, "opacity": 0.8 } }
        }
    });

    /* EFEK KETIK OTOMATIS */
    const text = '"Koleksi Karya Digital & Portofolio Terbaik"';
    let index = 0;
    function typeEffect() {
        if (index < text.length) {
            document.getElementById("typing-text").innerHTML += text.charAt(index);
            index++;
            setTimeout(typeEffect, 100); /* Kecepatan ngetik (100ms) */
        }
    }
    window.onload = typeEffect; /* Jalanin pas web dibuka */

    function openModal(element) {
        document.getElementById("myModal").style.display = "block";
        document.getElementById("img01").src = element.src;
        document.getElementById("caption").innerHTML = element.alt;
    }

    function likeKarya(btn) {
        let span = btn.nextElementSibling;
        if(!btn.disabled){
            span.innerText = parseInt(span.innerText) + 1;
            btn.innerHTML='❤️ Liked!';
            btn.disabled=true;
            btn.style.opacity='0.7';
            btn.style.borderColor = '#ff007a';
            btn.style.color = '#ff007a';
        }
    }
    </script>
</body>
</html>
