<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- KUNCI VIEWPORT: Mencegah zoom dan geser pada perangkat mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FryMediaOfficial - We Have Relocated</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* ==================== CLEAN & MINIMALIST RESET ==================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none; /* Mencegah teks sengaja/tidak sengaja terblok */
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Benar-benar mengunci scroll */
            background: #05070c; /* Hitam pekat solid yang bersih */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ==================== SIMPLIFIED PREMIUM CARD ==================== */
        .migration-box {
            width: 100%;
            max-width: 450px; /* Ukuran pas untuk layar HP maupun Desktop */
            text-align: center;
            padding: 30px 24px;
            background: #0b0e17; /* Biru gelap solid yang kontras */
            border: 1px solid rgba(0, 229, 255, 0.2); /* Garis biru neon tipis */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* ==================== CONTENT STYLES ==================== */
        .logo img {
            width: 75px;
            height: auto;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.6rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* Box Alamat Baru dengan Aksen Emas Sederhana */
        .url-section {
            background: #020408;
            border-left: 3px solid #d4af37; /* Aksen Emas Premium */
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .url-section span {
            display: block;
            font-size: 0.7rem;
            color: #d4af37; /* Emas */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .url-link {
            color: #00e5ff; /* Biru Neon Sederhana */
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
        }

        .countdown-text {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 20px;
        }

        #countdown {
            color: #00e5ff;
            font-weight: 700;
        }

        /* Tombol Navigasi Bersih */
        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: #0052d4; /* Biru Premium */
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s ease;
        }

        .btn-action:hover {
            background: #0066ff;
        }
    </style>
</head>
<body>

    <div class="migration-box">
        <div class="logo">
            <img src="logo.png" alt="FryMediaOfficial Logo">
        </div>
        <h2>System Migration</h2>
        <p>Website FryMediaOfficial telah dialihkan ke infrastruktur domain baru yang lebih optimal.</p>
        
        <div class="url-section">
            <span>Official New Domain</span>
            <a href="https://portofolio.frymediaofficial01.workers.dev/" class="url-link">new-official-web</a>
        </div>

        <div class="countdown-text">
            Pengalihan otomatis dalam <span id="countdown">10</span> detik
        </div>
        
        <a href="https://portofolio.frymediaofficial01.workers.dev/" class="btn-action">
            Kunjungi Sekarang
        </a>
    </div>

    <script>
        // Set target URL baru kamu di sini!
        const targetUrl = "https://portofolio.frymediaofficial01.workers.dev/";
        let seconds = 10;
        const countdownElement = document.getElementById("countdown");

        const interval = setInterval(() => {
            seconds--;
            if (countdownElement) {
                countdownElement.textContent = seconds;
            }
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>
</body>
</html>
