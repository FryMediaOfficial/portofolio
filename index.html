<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Gambar | FryMedia</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        header { padding: 50px 20px; }
        h1 { font-size: 2.5rem; color: #ff007a; margin-bottom: 10px; }
        p { color: #bbb; }
        
        /* Layout Galeri */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
            background-color: #222;
        }
        .gallery img:hover {
            transform: scale(1.05);
            border: 2px solid #ff007a;
        }
        footer { margin-top: 50px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>FRY MEDIA OFFICIAL</h1>
        <p>Koleksi Karya Digital & Portofolio Terbaik</p>
    </header>

    <div class="gallery">
        <img src="20260412_135701.png" alt="Karya 1">
        <img src="https://via.placeholder.com/400x400?text=Gambar+2" alt="Karya 2">
        <img src="https://via.placeholder.com/400x400?text=Gambar+3" alt="Karya 3">
        <img src="https://via.placeholder.com/400x400?text=Gambar+4" alt="Karya 4">
        <img src="https://via.placeholder.com/400x400?text=Gambar+5" alt="Karya 5">
        <img src="https://via.placeholder.com/400x400?text=Gambar+6" alt="Karya 6">
    </div>

    <footer>
        &copy; 2026 FryMediaOfficial. Dibuat dengan Tangan dan Pikiran.
    </footer>

</body>
</html>
