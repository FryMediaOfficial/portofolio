<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Gambar | FryMedia</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        header { padding: 50px 20px; }
        h1 { font-size: 2.5rem; color: #ff007a; margin-bottom: 10px; }
        p { color: #bbb; }
        
        /* Layout Galeri */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
            background-color: #222;
        }
        .gallery img:hover {
            transform: scale(1.05);
            border: 2px solid #ff007a;
        }
        footer { margin-top: 50px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>FRY MEDIA OFFICIAL</h1>
        <p>Koleksi Karya Digital & Portofolio Terbaik</p>
    </header>

    <div class="gallery">
    <div style="background: #1a1a1a; padding: 10px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333;">
        <img src="IMG_20260427_19233.png" alt="Karya 1" style="width:100%; border-radius: 10px;">
        <h3 style="margin: 10px 0 5px 0; color: #ff007a; font-size: 1.1rem;">NAMA KARAKTER 1</h3>
        <p style="margin: 0; font-style: italic; color: #bbb; font-size: 0.85rem;">"Kata-kata ikonik karakter 1..."</p>
    </div>

    <div style="background: #1a1a1a; padding: 10px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333;">
        <img src="NAMA_FILE_GAMBAR_2.jpg" alt="Karya 2" style="width:100%; border-radius: 10px;">
        <h3 style="margin: 10px 0 5px 0; color: #ff007a; font-size: 1.1rem;">NAMA KARAKTER 2</h3>
        <p style="margin: 0; font-style: italic; color: #bbb; font-size: 0.85rem;">"Kata-kata ikonik karakter 2..."</p>
    </div>

    <div style="background: #1a1a1a; padding: 10px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333;">
        <img src="NAMA_FILE_GAMBAR_3.jpg" alt="Karya 3" style="width:100%; border-radius: 10px;">
        <h3 style="margin: 10px 0 5px 0; color: #ff007a; font-size: 1.1rem;">NAMA KARAKTER 3</h3>
        <p style="margin: 0; font-style: italic; color: #bbb; font-size: 0.85rem;">"Kata-kata ikonik karakter 3..."</p>
    </div>

    </div>


    <footer>
        &copy; 2026 FryMediaOfficial. Dibuat dengan Tangan dan Pikiran.
    </footer>

</body>
</html>
